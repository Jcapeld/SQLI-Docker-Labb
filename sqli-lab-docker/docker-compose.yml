services:
  db:
    image: mysql:8.0
    container_name: sqli_lab_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sqli_lab
      MYSQL_USER: labuser
      MYSQL_PASSWORD: labpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 25

  web:
    build: ./web
    container_name: sqli_lab_web
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: sqli_lab
      DB_USER: labuser
      DB_PASS: labpass
      FLASK_ENV: production
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
